name: CI DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4

    - name: Vérifier Python
      run: python3 --version

    - name: Build Docker image
      run: docker build -t devops-ai-app .

    
    - name: Lancer le conteneur
	run: docker run -d -p 5000:5000 devops-ai-app



  - name: Attendre que l'application démarre
  run: |
    for i in {1..10}; do
      curl -s http://localhost:5000 && exit 0
      echo "Attente du serveur..."
      sleep 2
    done
    echo "Le serveur n'a pas démarré"
    exit 1

    
